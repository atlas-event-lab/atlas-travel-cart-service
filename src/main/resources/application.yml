server:
  port: 8088
  servlet:
    context-path: /api/v1

spring:
  application:
    name: travel-cart-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/travel_cart_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/atlas}

atlas:
  cart:
    ttl: ${CART_TTL:30m}
    sweep-interval-ms: ${CART_SWEEP_INTERVAL_MS:60000}

clients:
  frankfurter:
    base-url: https://api.frankfurter.dev

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.atlas: INFO
    org.springframework.security: WARN
